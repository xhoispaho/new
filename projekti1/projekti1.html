<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Love</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('images/rayya.jpg') no-repeat center center/cover;
        }

        .navbar {
            background: transparent;
            padding: 15px 40px;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .navbar-brand {
            color: #ffd700 !important;
            font-weight: bold;
            font-size: 22px;
        }

        .nav-link {
            color: white !important;
            margin: 0 10px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffd700 !important;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            border-radius: 20px;
            padding-left: 35px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .search-box input::placeholder {
            color: #ddd;
        }

        .search-box i {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: white;
        }

        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-left: 15px;
        }

        /* Carousel */
        .carousel-item img {
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">Movie Love</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Tv Show</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Movie</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Upcoming</a></li>
        </ul>
    </div>

    <div class="d-flex align-items-center">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" class="form-control" placeholder="Search movie">
        </div>

        <img src="https://i.pravatar.cc/40" class="profile-img" alt="profile">
    </div>
</nav>

<!-- CAROUSEL -->
<div id="movieCarousel" class="carousel slide" data-ride="carousel">

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="images/rayya.jpg" class="d-block w-100" alt="Raya">
        </div>

        <div class="carousel-item">
            <img src="images/rayya.jpg" class="d-block w-100" alt="Slide 2">
        </div>

        <div class="carousel-item">
            <img src="images/rayya.jpg" class="d-block w-100" alt="Slide 3">
        </div>

    </div>

    <a class="carousel-control-prev" href="#movieCarousel" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </a>

    <a class="carousel-control-next" href="#movieCarousel" role="button" data-slide="next">
        <span class="carousel-control-next-icon"></span>
    </a>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
